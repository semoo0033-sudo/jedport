<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة متابعة إعفاءات سفن التزويد بالوقود - ميناء جدة الإسلامي</title>

  <!-- Tailwind CDN (utility classes used throughout script.js) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles (fonts, badges, ribbon, animations, form controls) -->
  <link rel="stylesheet" href="style.css" />

  <!-- React + ReactDOM (UMD builds, no bundler needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone: lets the browser understand the JSX in script.js directly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Seed data (vessels + refuel operations) - must load before script.js -->
  <script src="data.js"></script>

  <!-- Main app (JSX, transpiled in-browser by Babel standalone) -->
  <script type="text/babel" src="script.js"></script>
</body>
</html>
